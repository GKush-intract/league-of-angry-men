<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The League of Angry Men · WC 2026 Predictor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<meta name="theme-color" content="#081310">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Barlow',sans-serif;color:#eef5ec;
       background:radial-gradient(120% 80% at 50% -10%, #12442a 0%, #0a1f14 45%, #070f0a 100%);}
  ::selection{background:#b6ff3a;color:#07140a;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  button{font-family:inherit;}
  #pitch{position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:repeating-linear-gradient(180deg, rgba(255,255,255,.016) 0 28px, rgba(0,0,0,0) 28px 56px);}
  #app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 14px 104px;}
</style>
</head>
<body>
<div id="pitch"></div>
<div id="app">
  <header style="position:sticky;top:0;z-index:30;margin:0 -14px;padding:11px 16px;background:linear-gradient(180deg,#081310 0%, rgba(8,19,16,.94) 100%);backdrop-filter:blur(8px);border-bottom:1px solid #1c3a28;">
    <div style="display:flex;align-items:center;gap:11px;">
      <div style="width:38px;height:38px;flex:none;border-radius:10px;background:radial-gradient(circle at 35% 30%, #1f7a45, #0c2d1a);border:1px solid #2c5a38;display:flex;align-items:center;justify-content:center;font-size:20px;">⚽</div>
      <div style="flex:1;min-width:0;">
        <div style="font-family:'Barlow Condensed';font-weight:800;font-size:16px;letter-spacing:.02em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">THE LEAGUE OF ANGRY MEN</div>
        <div style="font-size:10px;color:#7fd0a0;letter-spacing:.12em;font-weight:700;margin-top:3px;">FIFA WORLD CUP 2026 · PREDICTOR</div>
      </div>
      <div style="display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;background:rgba(182,255,58,.1);border:1px solid #2c5a38;flex:none;">
        <span style="width:7px;height:7px;border-radius:50%;background:#b6ff3a;animation:pulse 1.1s infinite;"></span>
        <span style="font-family:'Barlow Condensed';font-weight:700;font-size:10px;letter-spacing:.1em;color:#b6ff3a;">PHASE 1 LIVE</span>
      </div>
    </div>
  </header>
  <main id="view"></main>
  <div id="overlay"></div>
</div>
<nav id="nav" style="position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(8,19,16,.96);backdrop-filter:blur(10px);border-top:1px solid #20402c;">
  <div style="max-width:680px;margin:0 auto;display:flex;"></div>
</nav>
<script type="module" src="app.js"></script>
</body>
</html>
