name: Update standings

# Phase 2 (knockout) updater: scrape played knockout results from Wikipedia and refresh
# Phase-2 scoring. The group tables, the R32 bracket, and the player picks are all
# FINAL/LOCKED now, so we no longer re-scrape them — re-scraping finalized data has no
# benefit and only risks errors or corruption (e.g. the bracket parser would misread
# later rounds once they fill in). Run on demand from the Actions tab.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-standings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install lxml

      - name: Snapshot ranks (movement baseline)
        run: node scripts/snapshot-ranks.mjs

      - name: Update knockout results (Phase 2 + Phase 3 scoring)
        run: python3 scripts/fetch-knockout-results.py

      - name: Sync picks from the Sheets (Phase 2 + Phase 3, latest-wins)
        env:
          PICKS_CSV_URL: ${{ secrets.PICKS_CSV_URL }}
          PICKS3_CSV_URL: ${{ secrets.PICKS3_CSV_URL }}
        run: node scripts/fetch-picks.mjs

      - name: Run tests
        run: node --test

      - name: Validate data
        run: node scripts/validate-data.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data.json; then
            echo "No changes to data.json"
          else
            git add data.json
            git commit -m "chore: update knockout results $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
